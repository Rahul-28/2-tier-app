version: '3.9'

services:
  backend:
    build:
      context: ./back-end
    command: npm run dev
    volumes:
      - /back-end/src/:/app/src
    environment:
      NODE_ENV: development
    ports:
      -"5000:5000"

  frontend:
    build: 
      context: ./front-end
    volumes:
      - ./front-end/src:/app/src
      - ./front-end/public:/app/public
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    depends_on:
      - backend

