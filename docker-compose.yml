services:
  backend:
    build: 
      context: ./backend
    container_name: notes-backend
    command: npm start
    restart: unless-stopped
    networks:
      - 2tier-app
    volumes:
      - ./backend/src:/app/src
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: 
      context: ./frontend
    container_name: notes-frontend
    restart: unless-stopped
    networks:
      - 2tier-app
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  2tier-app:
    driver: bridge